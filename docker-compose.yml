version: '3.8'

services:
  focussphere:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - focussphere_data:/tmp
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/h2-console"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  focussphere_data:
    driver: local
