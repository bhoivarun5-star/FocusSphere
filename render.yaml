services:
  - type: web
    name: focussphere
    runtime: docker
    region: ohio
    plan: standard
    
    # Build configuration
    dockerfilePath: ./Dockerfile
    
    # Environment variables
    envVars:
      # Spring Boot Configuration
      - key: PORT
        value: 8080
      
      # Spring Profile (uses application-render.properties)
      - key: SPRING_PROFILES_ACTIVE
        value: render
      
      # Database Configuration
      # For H2 (default):
      - key: DB_URL
        value: jdbc:h2:file:/tmp/focussphere_prod;MODE=MySQL
      - key: DB_USERNAME
        value: sa
      - key: DB_PASSWORD
        value: 
      - key: DB_DRIVER
        value: org.h2.Driver
      - key: DB_PLATFORM
        value: org.hibernate.dialect.H2Dialect
      
      # OPTIONAL: Uncomment and configure for MySQL/PostgreSQL
      # - key: DB_URL
      #   value: ${DATABASE_URL}
      # - key: DB_DRIVER
      #   value: org.postgresql.Driver
      # - key: DB_PLATFORM
      #   value: org.hibernate.dialect.PostgreSQL10Dialect
      
      # Admin Configuration (CHANGE THESE!)
      - key: ADMIN_NAME
        value: System Admin
      - key: ADMIN_EMAIL
        value: admin@focussphere.com
      - key: ADMIN_PHONE
        value: 9999999999
      - key: ADMIN_ROLL_NO
        value: ADMIN001
      - key: ADMIN_PASSWORD
        value: ChangeThis@123
      
      # Mail Configuration (Optional - leave empty if not using)
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        value: 
      - key: MAIL_PASSWORD
        value: 
      - key: MAIL_SMTP_AUTH
        value: "true"
      - key: MAIL_STARTTLS_ENABLE
        value: "true"
      - key: MAIL_STARTTLS_REQUIRED
        value: "true"
      
      # Java/JVM Configuration
      - key: JAVA_OPTS
        value: -Xms512m -Xmx1024m
    
    # Build command (Maven build via Dockerfile)
    buildCommand: ""
    
    # Start command (runs via Dockerfile ENTRYPOINT)
    startCommand: ""
    
    # Health check endpoint
    healthCheckPath: /actuator/health
    healthCheckTimeout: 10
    healthCheckStartPeriod: 60
    
    # Deployment settings
    numInstances: 1
    maxInstanceCount: 2
    autoDeploy: true
    
    # Log settings
    logging:
      level: INFO
      
    # Disk and Memory
    disk:
      sizeGB: 1
    
    # Environment files from Render dashboard
    # Create a .env file in Render dashboard with sensitive values

# Note: Sensitive values (admin passwords, mail credentials) should be set via Render Dashboard
# Environment > Environment Variables instead of committing to this file
