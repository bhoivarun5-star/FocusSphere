services:
  - type: web
    name: focussphere
    runtime: docker
    
    # Build configuration
    dockerfilePath: ./Dockerfile
    
    # Port configuration
    port: 8080
    
    # Environment variables
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
      - key: PORT
        value: 8080
    
    # Health check endpoint
    healthCheckPath: /h2-console
    
    # Auto-deploy on push
    autoDeploy: true
