spring.application.name=focussphere
spring.profiles.active=prod

# Database Configuration - H2 with file persistence in /tmp
spring.datasource.url=jdbc:h2:file:/tmp/focussphere_prod
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (Disabled in production for security)
spring.h2.console.enabled=false

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging
logging.level.root=WARN
logging.level.com.focussphere=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Security - Admin credentials (CHANGE THESE IMMEDIATELY)
admin.email=admin@focussphere.com
admin.password=ChangeThis@123

# Session Configuration
server.servlet.session.timeout=30m
spring.session.store-type=none

# Mail Configuration (Optional)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.socketFactory.port=587
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
