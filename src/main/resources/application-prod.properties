spring.application.name=FocusSphere

# Server configuration
server.port=8080
server.servlet.session.timeout=30m

# Database - Using H2 with file persistence for Render
spring.datasource.url=jdbc:h2:file:/tmp/focussphere_prod;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disable in production for security, or keep protected)
spring.h2.console.enabled=false

# Session timeout
server.servlet.session.timeout=30m

# Seed admin credentials (CHANGE THESE!)
focussphere.admin.name=System Admin
focussphere.admin.email=admin@focussphere.com
focussphere.admin.phone=9999999999
focussphere.admin.rollNo=ADMIN001
focussphere.admin.password=ChangeThis@123

# Logging configuration
logging.level.root=WARN
logging.level.com.focussphere=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# JSP view resolver
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# WebSocket configuration
spring.websocket.enabled=true
